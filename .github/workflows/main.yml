name: Auto Sign

on:
  push:
    branches: [ main ]
  schedule:
    # 每天北京时间早上 8:05 自动执行 (UTC 0:05)
    - cron: '5 0 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        # 这里是核心：安装项目运行所需要的库
        run: npm install

      - name: Run Sign Script
        env:
          # 确保你在 Settings -> Secrets 里填了这两个变量
          CHAOXING_USERNAME: ${{ secrets.CHAOXING_USERNAME }}
          CHAOXING_PASSWORD: ${{ secrets.CHAOXING_PASSWORD }}
        run: npm start
